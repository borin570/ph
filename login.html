<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/db1bef8b03.js"
      crossorigin="anonymous"
    ></script>
    <title>LOGIN</title>
    <style>
      .email,.pass{
        font-family: cursive;
        font-size: 1.2vw;
      }
      .email input{
        border-radius: 2vw;
        transition: 0.6s;
        height: 25px;
        width: 220px;
        font-family: sans-serif;
      }
      .email input:hover{
      margin-top: 3px;
      transition: 0.6s;
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
    }
      .pass input{
        border-radius: 2vw;
        height: 25px;
        width: 220px;
        transition: 0.6s;
        font-family: sans-serif;
      }
      .pass input:hover{
      margin-top: 3px;
      transition: 0.6s;
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
    }
      .box {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 175px;
      }
      h1 {
        font-family: cursive;
        text-align: center;
      }
      fieldset {
        width: 400px;
        background-color: white;
        padding: 60px;
        border-radius: 2vw;
      }
      .buttonup {
        border: none;
      }
      .fa-brands {
        font-size: 16px;
      }
      .box a {
        font-size: 16px;
      }
      .box div {
        font-size: 20px;
      }
      .video-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
    }
    button{
      cursor: pointer;
      border-radius: 2vw;
      width: 120px;
      height: 30px;
      transition: 0.6s;
      font-family: cursive;
      font-size: 1vw;
      padding: auto;
      border: 0;
      background-color: cornflowerblue;
    }
    button a{
      color: aliceblue;
      text-decoration: none;
    }
    button:hover {
      margin-top: 3px;
      transition: 0.6s;
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
      background-color: darkgrey;
    }
  i{
    position: absolute;
    margin-left: 308px;
    margin-top: 11px;
    font-size: 0.9vw;
    cursor: pointer;
  }
    </style>
  </head>
  <body>
    <video autoplay muted loop class="video-bg" 
      src="4k Video  Technology Looped Background  No Copyright Loop Background Video.mp4">
    </video>
    <div class="box">
      <form action="index.html" onsubmit="return false;">
        <fieldset>
          <legend align="center"></legend>
          <h1>LOGIN</h1>
          <br />
          <div class="email">
            Email :
            <input type="text" id="Username" placeholder="  Username" />
          </div>
          <br />
          <i id="toggle" onclick="ChangeIcon()" class="fa-solid fa-eye-slash"></i>
          <div class="pass">
            Password :
            <input
              type="password"
              id="Password"
              placeholder="  Password"
            />
          </div>
          <br />
            <button onclick="Login()" type="submit">
            <a href="index.html">SAVE</a>
          </button>
          <br /><br />
          
          <button type="button"><a href="register.html">REGISTER</a></button><br>
          <p style="font-size: 1.1vw;font-family: sans-serif;">
            <a href="register.html">Don't have Accound Please Register.</a>
          </p>
        </fieldset>
      </form>
    </div>
  </body>
  <script src="Index.js"></script>
</html>
